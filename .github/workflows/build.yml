name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - run: chmod +x gradlew || true

    - run: ./gradlew assembleDebug || echo "Gradle wrapper missing"

    - uses: actions/upload-artifact@v3
      with:
        name: APK
        path: app/build/outputs/apk/debug/app-debug.apk || echo "APK not found"
